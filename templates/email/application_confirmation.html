<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Application received — {{ app_name }}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f5; margin: 0; padding: 40px 0; }
    .card { background: #fff; max-width: 560px; margin: 0 auto; border-radius: 8px;
            padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { font-size: 22px; color: #111; }
    p  { color: #555; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 24px; padding: 14px 28px;
           background: #2563eb; color: #fff; text-decoration: none;
           border-radius: 6px; font-weight: 600; }
    .footer { margin-top: 32px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Application received ✓</h1>
    <p>Hi {{ candidate_name }},</p>
    <p>We received your application for <strong>{{ job_title }}</strong>. Use the link below to track your application status at any time.</p>
    <a href="{{ tracking_url }}" class="btn">Track my application</a>
    <p class="footer">You received this email because you submitted an application through {{ app_name }}.</p>
  </div>
</body>
</html>
