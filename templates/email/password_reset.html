<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset your password — {{ app_name }}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f5; margin: 0; padding: 40px 0; }
    .card { background: #fff; max-width: 560px; margin: 0 auto; border-radius: 8px;
            padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { font-size: 22px; color: #111; }
    p  { color: #555; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 24px; padding: 14px 28px;
           background: #dc2626; color: #fff; text-decoration: none;
           border-radius: 6px; font-weight: 600; }
    .footer { margin-top: 32px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p>We received a request to reset your {{ app_name }} password. Click the button below. This link expires in 1 hour.</p>
    <a href="{{ reset_url }}" class="btn">Reset Password</a>
    <p class="footer">If you didn't request a password reset, you can safely ignore this email.</p>
  </div>
</body>
</html>
