<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify your email — {{ app_name }}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f5; margin: 0; padding: 40px 0; }
    .card { background: #fff; max-width: 560px; margin: 0 auto; border-radius: 8px;
            padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { font-size: 22px; color: #111; margin-bottom: 8px; }
    p  { color: #555; line-height: 1.6; }
    .btn { display: inline-block; margin-top: 24px; padding: 14px 28px;
           background: #2563eb; color: #fff; text-decoration: none;
           border-radius: 6px; font-weight: 600; }
    .footer { margin-top: 32px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify your email address</h1>
    <p>Thanks for signing up with <strong>{{ app_name }}</strong>. Click the button below to activate your account.</p>
    <a href="{{ verification_url }}" class="btn">Verify Email</a>
    <p class="footer">
      If you did not create an account, you can safely ignore this email.<br/>
      This link expires in 24 hours.
    </p>
  </div>
</body>
</html>
